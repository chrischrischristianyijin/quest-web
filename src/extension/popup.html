<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Extension</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        /* 重置Chrome扩展默认样式 */
        html {
            margin: 0;
            padding: 0;
            border: none;
            outline: none;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #B699BB;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #65558F;
        }
        body {
            width: 320px;
            min-height: 240px;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background: white;
            color: #1D1B20;
            border: none;
            outline: none;
            overflow: hidden;
            box-shadow: none;
        }
        
        /* 隐藏Chrome扩展默认边框 */
        body::-webkit-scrollbar {
            display: none;
        }
        
        /* 确保没有默认边框 */
        * {
            box-sizing: border-box;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 15px;
            padding-top: 70px;
            margin: 5px;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
        }

        h1 {
            position: absolute;
            top: 20px;
            right: 20px;
            margin: 0;
            font-size: 24px;
            font-family: 'Pacifico', cursive;
            font-weight: 400;
            color: #4B264F;
        }
        
        h1 a {
            transition: color 0.2s ease;
        }
        
        h1 a:hover {
            color: #65558F;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 13px;
        }

        input, textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            background: white;
            color: #1D1B20;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #B699BB;
            box-shadow: 0 0 0 2px rgba(182, 153, 187, 0.2);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #B699BB;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 8px;
        }

        button:hover {
            background: #65558F;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-link {
            text-align: center;
            margin-top: 10px;
        }

        .toggle-link a {
            color: #B699BB;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .toggle-link a:hover {
            color: #65558F;
            text-decoration: underline;
        }

        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: rgba(182, 153, 187, 0.1);
            border: 1px solid #B699BB;
            color: #65558F;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #d32f2f;
        }

                .user-info {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tag-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .tag-option {
            padding: 4px 10px;
            border: 1px solid #D9D9D9;
            border-radius: 16px;
            background: white;
            color: #1D1B20;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: inline-block;
            box-sizing: border-box;
            min-width: fit-content;
        }
        
        .tag-option:hover {
            border-color: #B699BB;
            background: rgba(182, 153, 187, 0.1);
        }
        
        .tag-option.selected {
            background: #65558F !important;
            color: white !important;
            border-color: #65558F !important;
        }
        
        .add-tag-section {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        
        .new-tag-input {
            flex: 1;
            padding: 4px 10px;
            border: 1px solid #D9D9D9;
            border-radius: 16px;
            background: white;
            color: #1D1B20;
            font-size: 12px;
            box-sizing: border-box;
        }
        
        .new-tag-input:focus {
            outline: none;
            border-color: #B699BB;
            box-shadow: 0 0 0 2px rgba(182, 153, 187, 0.2);
        }
        
        .add-tag-btn {
            width: 24px;
            height: 24px;
            border: 1px solid #B699BB;
            border-radius: 50%;
            background: #B699BB;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .add-tag-btn:hover {
            background: #65558F;
            border-color: #65558F;
        }
        
        .show-add-tag-btn {
            padding: 4px 10px;
            border: 1px solid #D9D9D9;
            border-radius: 16px;
            background: white;
            color: #1D1B20;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: inline-block;
            box-sizing: border-box;
            min-width: fit-content;
        }
        
        .show-add-tag-btn:hover {
            border-color: #B699BB;
            background: rgba(182, 153, 187, 0.1);
        }
        
        .selected-tags-display {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 18px;
        }

        .selected-tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 6px;
            background: #65558F;
            color: white;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .selected-tag:hover {
            background: #4B264F;
        }

        .tag-remove {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .tag-remove:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .password-requirements {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            padding-left: 2px;
            line-height: 1.3;
        }

        .password-warning {
            background-color: #fef3c7;
            color: #92400e;
            border: 1px solid #f59e0b;
            border-radius: 6px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 12px;
            display: none;
        }

        .password-warning.show {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }








    </style>
</head>
<body>
    <div class="container">
        <h1><a href="https://myquestspace.com" target="_blank" style="text-decoration: none; color: inherit;">Quest</a></h1>
        
        <!-- User Avatar -->
        <div id="userAvatar" style="display: none; position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; border-radius: 50%; background: #65558F; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; cursor: pointer;"></div>
        
        <!-- Message Display Area -->
        <div id="message" class="message"></div>
        
        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit">Login</button>
            <div class="toggle-link">
                <a id="showSignup">Don't have an account? Sign up</a>
        </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display: none;">
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label for="signupNickname">Nickname</label>
                <input type="text" id="signupNickname" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required>
                <div class="password-requirements">
                    Password must be at least 8 characters long and contain at least one special character (!@#$%^&*(),.?":{}|<>)
                </div>
                <div id="passwordWarning" class="password-warning"></div>
            </div>
            <div class="form-group">
                <label for="signupConfirmPassword">Confirm Password</label>
                <input type="password" id="signupConfirmPassword" required>
            </div>
            <button type="submit">Sign Up</button>
            <div class="toggle-link">
                <a id="showLogin">Already have an account? Login</a>
        </div>
        </form>

        <!-- User Info -->
        <div id="userInfo" style="display: none;"></div>
        
        <!-- Insight Save Form -->
        <form id="insightsForm" style="display: none;">
            <div class="form-group">
                <label for="insightUrl">Page URL</label>
                <input type="url" id="insightUrl" required>
            </div>
            <div class="form-group">
                <label>Tags (optional)</label>
                <div class="tag-selector" id="tagSelector">
                    <!-- Tags will be dynamically loaded by JavaScript -->
                </div>
            </div>
            <button type="submit">Save to Collection</button>
        </form>


    </div>

    <script src="popup.js"></script>
</body>
</html>
